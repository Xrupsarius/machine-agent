# Push-to-talk ("рация") for Machine Agent — GENERATED by the app.
# Bound key: Menu. Re-assign or reset it from the app window.
#
# This file must be sourced from your Hyprland config (then `hyprctl reload`):
#     source = ~/projects/machine-agent/config/hyprland-ptt.conf
#
# SIGUSR1 = key pressed  -> start recording
# SIGUSR2 = key released -> stop + transcribe + type at the cursor

bind  = , Menu, exec, kill -USR1 "$(cat /home/xrups/projects/machine-agent/data/app.pid 2>/dev/null)"
bindr = , Menu, exec, kill -USR2 "$(cat /home/xrups/projects/machine-agent/data/app.pid 2>/dev/null)"
