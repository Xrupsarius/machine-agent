# Push-to-talk ("рация") for Machine Agent on Hyprland.
#
# How to enable: add this line to your Hyprland config (e.g. ~/.config/hypr/hyprland.conf
# or ~/.config/hypr/keybindings.conf), then reload Hyprland (hyprctl reload):
#
#     source = ~/projects/machine-agent/config/hyprland-ptt.conf
#
# Then switch the app to "📻 Рация" mode (the button in the window, top-right,
# or set `activation_mode: ptt` in config.yaml). Hold the key and speak; release
# to type what you said at the cursor.
#
# The app writes its PID to data/app.pid; these binds signal that process:
#   SIGUSR1 = key pressed  -> start recording
#   SIGUSR2 = key released -> stop + transcribe + type at cursor
#
# Verify in the app log: "PTT pressed (SIGUSR1)" on press, "PTT released (SIGUSR2)"
# on release.

# --- Active: hold "g" --------------------------------------------------------
# WARNING: a bare letter key is consumed globally — while in рация mode you will
# NOT be able to type the letter "g" normally (every "g" press starts recording).
# Convenient, but conflicts with typing. If that bothers you, comment these two
# lines and use the SUPER+G block below instead.
bind  = , g, exec, kill -USR1 "$(cat /home/xrups/projects/machine-agent/data/app.pid 2>/dev/null)"
bindr = , g, exec, kill -USR2 "$(cat /home/xrups/projects/machine-agent/data/app.pid 2>/dev/null)"

# --- Safe alternative: hold SUPER + G ----------------------------------------
# No conflict with normal typing — the letter "g" stays usable. Hold both keys
# to talk, release to type.
#
# bind  = SUPER, g, exec, kill -USR1 "$(cat /home/xrups/projects/machine-agent/data/app.pid 2>/dev/null)"
# bindr = SUPER, g, exec, kill -USR2 "$(cat /home/xrups/projects/machine-agent/data/app.pid 2>/dev/null)"
